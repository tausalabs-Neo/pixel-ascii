<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Dibuja pixel art y conviértelo al instante en arte ASCII. Elige colores, tamaño de grilla y densidad de caracteres.">
<title>Pixel Art → ASCII</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    gap: 20px;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 500;
    color: #c9b8ff;
    letter-spacing: 0.05em;
  }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    background: #16213e;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid #2a2a5e;
  }

  .toolbar label { font-size: 13px; color: #aaa; }

  .color-swatches {
    display: flex;
    gap: 6px;
  }

  .swatch {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.1s;
  }

  .swatch:hover { transform: scale(1.15); }
  .swatch.active { border-color: #fff; }

  .sep { width: 1px; height: 28px; background: #2a2a5e; }

  button {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #1e1e3f;
    color: #ddd;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }

  button:hover { background: #2a2a6e; }
  button.danger { border-color: #8b1a1a; }
  button.danger:hover { background: #3a1a1a; }
  button.primary { background: #4a3a8a; border-color: #7a6aaa; }
  button.primary:hover { background: #5a4a9a; }

  select {
    padding: 5px 8px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #1e1e3f;
    color: #ddd;
    font-size: 13px;
    cursor: pointer;
  }

  .canvases {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
  }

  .panel {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }

  .panel-label {
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  #draw-canvas {
    cursor: crosshair;
    border-radius: 8px;
    border: 2px solid #2a2a5e;
    image-rendering: pixelated;
    touch-action: none;
  }

  #ascii-output {
    font-family: 'Courier New', monospace;
    font-size: 9px;
    line-height: 1.05;
    white-space: pre;
    background: #0d0d1a;
    padding: 12px;
    border-radius: 8px;
    border: 2px solid #2a2a5e;
    color: #c8ffc8;
    min-width: 220px;
    min-height: 220px;
    overflow: auto;
    user-select: all;
  }

  .copy-notice {
    font-size: 12px;
    color: #7aff7a;
    opacity: 0;
    transition: opacity 0.3s;
    height: 18px;
  }

  .copy-notice.show { opacity: 1; }

  input[type="range"] {
    width: 80px;
    accent-color: #7a6aaa;
  }
</style>
</head>
<body>

<h1>Pixel Art → ASCII</h1>

<div class="toolbar">
  <label>Color</label>
  <div class="color-swatches" id="swatches"></div>
  <div class="sep"></div>
  <label>Tamaño</label>
  <select id="grid-size">
    <option value="16">16×16</option>
    <option value="24" selected>24×24</option>
    <option value="32">32×32</option>
  </select>
  <div class="sep"></div>
  <label>Densidad</label>
  <input type="range" id="density" min="1" max="3" step="1" value="2">
  <div class="sep"></div>
  <button class="danger" id="btn-clear">Limpiar</button>
  <button class="primary" id="btn-copy">Copiar ASCII</button>
</div>

<div class="canvases">
  <div class="panel">
    <div class="panel-label">Dibuja aquí</div>
    <canvas id="draw-canvas" width="480" height="480"></canvas>
  </div>
  <div class="panel">
    <div class="panel-label">ASCII en vivo</div>
    <div id="ascii-output"></div>
    <div class="copy-notice" id="copy-notice">¡Copiado al portapapeles!</div>
  </div>
</div>

<script>
const PALETTE = [
  '#ffffff','#c8ffc8','#70d670','#228822',
  '#ffcc66','#ff8833','#ff4444','#cc2288',
  '#88aaff','#4466ff','#223388','#000000',
];

const CHAR_SETS = [
  [' ','.',':','o','O','#'],
  [' ','.','*','+','X','@'],
  [' ','-','=','x','%','█'],
];

let activeColor = '#ffffff';
let isDrawing = false;
let lastCell = null;

const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');
const ascii = document.getElementById('ascii-output');
const notice = document.getElementById('copy-notice');
const gridSel = document.getElementById('grid-size');
const densitySel = document.getElementById('density');

function getGridSize() { return parseInt(gridSel.value); }
function getCellSize() { return canvas.width / getGridSize(); }

let grid = [];

function initGrid() {
  const n = getGridSize();
  grid = Array.from({length: n}, () => Array(n).fill(null));
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawGridLines();
  renderASCII();
}

function drawGridLines() {
  const n = getGridSize();
  const cs = getCellSize();
  ctx.strokeStyle = '#1a1a3e';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= n; i++) {
    ctx.beginPath(); ctx.moveTo(i * cs, 0); ctx.lineTo(i * cs, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * cs); ctx.lineTo(canvas.width, i * cs); ctx.stroke();
  }
}

function cellFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const touch = e.touches ? e.touches[0] : e;
  const x = (touch.clientX - rect.left) * scaleX;
  const y = (touch.clientY - rect.top) * scaleY;
  const cs = getCellSize();
  return [Math.floor(x / cs), Math.floor(y / cs)];
}

function paint(col, row) {
  if (col < 0 || row < 0 || col >= getGridSize() || row >= getGridSize()) return;
  const key = `${col},${row}`;
  if (lastCell === key) return;
  lastCell = key;
  grid[row][col] = activeColor;
  const cs = getCellSize();
  ctx.fillStyle = activeColor;
  ctx.fillRect(col * cs, row * cs, cs, cs);
  ctx.strokeStyle = '#1a1a3e';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(col * cs, row * cs, cs, cs);
  renderASCII();
}

function colorToGray(hex) {
  if (!hex) return 0;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r * 299 + g * 587 + b * 114) / 1000;
}

function renderASCII() {
  const n = getGridSize();
  const density = parseInt(densitySel.value) - 1;
  const chars = CHAR_SETS[density];
  let out = '';
  for (let r = 0; r < n; r++) {
    for (let c = 0; c < n; c++) {
      const v = colorToGray(grid[r][c]);
      const idx = Math.round((v / 255) * (chars.length - 1));
      out += chars[idx];
    }
    out += '\n';
  }
  ascii.textContent = out;
}

canvas.addEventListener('mousedown', e => { isDrawing = true; lastCell = null; paint(...cellFromEvent(e)); });
canvas.addEventListener('mousemove', e => { if (isDrawing) paint(...cellFromEvent(e)); });
canvas.addEventListener('mouseup', () => { isDrawing = false; lastCell = null; });
canvas.addEventListener('mouseleave', () => { isDrawing = false; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; lastCell = null; paint(...cellFromEvent(e)); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (isDrawing) paint(...cellFromEvent(e)); }, {passive:false});
canvas.addEventListener('touchend', () => { isDrawing = false; });

document.getElementById('btn-clear').addEventListener('click', initGrid);

document.getElementById('btn-copy').addEventListener('click', () => {
  navigator.clipboard.writeText(ascii.textContent).then(() => {
    notice.classList.add('show');
    setTimeout(() => notice.classList.remove('show'), 2000);
  });
});

gridSel.addEventListener('change', initGrid);
densitySel.addEventListener('input', renderASCII);

const swatchContainer = document.getElementById('swatches');
PALETTE.forEach(color => {
  const s = document.createElement('div');
  s.className = 'swatch' + (color === activeColor ? ' active' : '');
  s.style.background = color;
  s.title = color;
  s.addEventListener('click', () => {
    document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
    activeColor = color;
  });
  swatchContainer.appendChild(s);
});

initGrid();
</script>
</body>
</html>
